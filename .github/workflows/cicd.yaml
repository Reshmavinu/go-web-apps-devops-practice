name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'helm/**'
      - 'k8s/**'
      - 'README.md'
concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: go-web-apps-devops-practice
  REGISTRY: docker.io

jobs:

  # ---------------------------
  # 1. Build & Test
  # ---------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o main

  # ---------------------------
  # 2. Lint (blocking)
  # ---------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # ---------------------------
  # 3. Docker Build & Push
  # ---------------------------
  docker:
    runs-on: ubuntu-latest
    needs: [build, lint]

    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      # ✅ Generate single source of truth tag
      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ✅ Build & push using SAME tag
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cache,mode=max

  # ---------------------------
  # 4. Deploy to DEV
  # ---------------------------
  deploy-dev:
    runs-on: ubuntu-latest
    needs: docker
    environment: nonprod

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Install yq
        run: sudo snap install yq

      # ✅ Use SAME tag from docker job
      - name: Update Helm (nonprod)
        run: |
          yq e -i '.image.tag = "${{ needs.docker.outputs.image_tag }}"' helm/go-web-app-chart/values.yaml

      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Deploy nonprod: ${{ needs.docker.outputs.image_tag }}"
          git push
