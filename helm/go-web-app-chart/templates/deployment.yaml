# This is a sample deployment manifest file for a simple web application.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-web-apps-devops-practice
  labels:
    app: go-web-apps-devops-practice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-web-apps-devops-practice
  template:
    metadata:
      labels:
        app: go-web-apps-devops-practice
    spec:
      containers:
      - name: go-web-apps-devops-practice
        image: reshmaannababu/go-web-apps-devops-practice:{{ .Values.image.tag }}
        ports:
        - containerPort: 8080
